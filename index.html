<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZapMove - Transporte e Delivery</title>
    <meta name="description" content="ZapMove - Sua solução premium para transporte e delivery via WhatsApp." />
    
    <!-- PWA & Mobile Assets -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/zapmove-icon/192/192" />
    <link rel="apple-touch-icon" sizes="152x152" href="https://picsum.photos/seed/zapmove-icon/152/152" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://picsum.photos/seed/zapmove-icon/180/180" />
    <link rel="apple-touch-icon" sizes="167x167" href="https://picsum.photos/seed/zapmove-icon/167/167" />
    
    <!-- iOS Specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ZapMove" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Windows Specific -->
    <meta name="msapplication-TileColor" content="#22c55e" />
    <meta name="msapplication-TileImage" content="https://picsum.photos/seed/zapmove-icon/144/144" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#22c55e" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
